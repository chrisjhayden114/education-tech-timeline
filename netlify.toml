[build]
  publish = "."
  command = "node scripts/write-supabase-config.js"

# Anon URL/key are meant for the browser client (RLS protects the DB).
# Omit them from Netlify secret scanning so writing supabase-config.js does not fail the build.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

# Avoid stale HTML/JS/JSON after deploys (By the Numbers / At a glance must stay in sync)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
